name: Build APK Final
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Tools
        run: |
          pip install flet[all] groq
          # On vérifie que les outils sont là
          flet --version

      - name: Build Android
        # Commande ultra-simplifiée pour éviter l'erreur "unrecognized arguments"
        run: yes | flet build apk --product "ALUETOO AI" --icon icon.png

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ALUETOO-AI-APP
          path: build/apk/*.apk
