name: Build APK Final
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Tools
        run: pip install flet[all] groq pytz

      - name: Build Android
        run: yes | flet build apk --product "ALUETOO AI"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ALUETOO-AI-APP
          # C'est ici qu'on lui dit où trouver le fichier
          path: build/apk/*.apk

