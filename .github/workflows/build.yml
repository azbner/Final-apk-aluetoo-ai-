name: Build APK Final avec Icone
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Tools
        run: pip install flet[all] groq

      - name: Build Android
        # On ajoute --icon ici (vérifie que le nom du fichier est le bon !)
        run: yes | flet build apk --product "ALUETOO AI" --include-packages groq --icon "icon.jpeg"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ALUETOO-AI-APP
          path: build/apk/*.apk

