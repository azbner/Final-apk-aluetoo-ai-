name: Build APK Final
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install flet[all] groq pytz

      - name: Build Android
        # On force l'inclusion de TOUT ce qui manque
        run: yes | flet build apk --product "ALUETOO AI" --include-packages groq pytz

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ALUETOO-AI-APP
          path: build/apk/*.apk

