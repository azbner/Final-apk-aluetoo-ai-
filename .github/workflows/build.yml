name: Build APK Final
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Tools
        run: pip install flet[all] groq

      - name: Build Android
        # On a simplifié les guillemets pour que Flet comprenne bien chaque morceau
        run: yes | flet build apk --product "ALUETOO AI" --include-packages groq --icon icon.png

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ALUETOO-AI-APP
          path: build/apk/*.apk
