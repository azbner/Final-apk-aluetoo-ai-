name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: subosito/flutter-action@v2
      - name: Install Python & Flet
        run: |
          python -m pip install --upgrade pip
          pip install flet groq pytz
      - name: Build APK
        run: flet build apk
      - name: Upload APK
        uses: actions/upload-artifact@v2
        with:
          name: ALUETOO-AI-APP
          path: build/apk/*.apk
